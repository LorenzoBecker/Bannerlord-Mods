name: Build All Bosses Everywhere 2.1

on:
  workflow_dispatch:
  push:
    branches:
      - build/all-bosses-everywhere-v2.1
    paths:
      - 'abe-v2.1/**'
      - '.github/workflows/build-abe-v2.1.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'abe-v2.1/**'
      - '.github/workflows/build-abe-v2.1.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Checkout SPT 4.0.13 source
        uses: actions/checkout@v4
        with:
          repository: sp-tarkov/server-csharp
          ref: c87cc3c6853c622fd2addaf961f58467cd9754f2
          path: spt

      - name: Disable SPT Ceciler post-build pass
        shell: bash
        run: |
          sed -i 's/<Target Name="AfterEverythingDone"/<Target Condition="false" Name="AfterEverythingDone"/' spt/Libraries/SPTarkov.Server.Core/SPTarkov.Server.Core.csproj

      - name: Build mod
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          dotnet build abe-v2.1/AllBossesEverywhere.csproj -c Debug -o abe-v2.1/out 2>&1 | tee abe-v2.1/build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ABE-2.1-build-log
          path: abe-v2.1/build.log

      - name: Prepare artifact
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p artifact/SPT/user/mods/AllBossesEverywhere
          cp abe-v2.1/out/AllBossesEverywhere.dll artifact/SPT/user/mods/AllBossesEverywhere/
          cp abe-v2.1/config.json artifact/SPT/user/mods/AllBossesEverywhere/
          cp abe-v2.1/README-FR.md artifact/SPT/user/mods/AllBossesEverywhere/

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AllBossesEverywhere-2.1.0-SPT-4.0.13
          path: artifact/

      - name: Fail workflow when compilation failed
        if: steps.build.outcome != 'success'
        run: exit 1
