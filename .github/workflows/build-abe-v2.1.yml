name: Build Bosses Extravaganza 1.0

on:
  workflow_dispatch:
  push:
    branches:
      - build/all-bosses-everywhere-v2.1
    paths:
      - 'abe-v2.1/**'
      - '.github/workflows/build-abe-v2.1.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'abe-v2.1/**'
      - '.github/workflows/build-abe-v2.1.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Checkout SPT 4.0.13 source
        uses: actions/checkout@v4
        with:
          repository: sp-tarkov/server-csharp
          ref: c87cc3c6853c622fd2addaf961f58467cd9754f2
          path: spt

      - name: Patch release metadata
        shell: bash
        run: |
          sed -i 's/com.lorenzobecker.allbosseseverywhere/com.lorenzobecker.bossesextravaganza/g' abe-v2.1/AllBossesEverywhere.cs
          sed -i 's/All Bosses Everywhere/Bosses Extravaganza/g' abe-v2.1/AllBossesEverywhere.cs
          sed -i 's/v2\.1\.0/v1.0.0/g' abe-v2.1/AllBossesEverywhere.cs
          sed -i 's/new("2\.1\.0")/new("1.0.0")/g' abe-v2.1/AllBossesEverywhere.cs

      - name: Disable SPT Ceciler post-build pass
        shell: bash
        run: |
          sed -i 's/<Target Name="AfterEverythingDone"/<Target Condition="false" Name="AfterEverythingDone"/' spt/Libraries/SPTarkov.Server.Core/SPTarkov.Server.Core.csproj

      - name: Build mod
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          dotnet build abe-v2.1/AllBossesEverywhere.csproj -c Debug -o abe-v2.1/out 2>&1 | tee abe-v2.1/build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BossesExtravaganza-build-log
          path: abe-v2.1/build.log

      - name: Prepare artifact
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p artifact/BossesExtravaganza
          cp abe-v2.1/out/BossesExtravaganza.dll artifact/BossesExtravaganza/
          cp abe-v2.1/config.json artifact/BossesExtravaganza/
          cp abe-v2.1/README-FR.md artifact/BossesExtravaganza/README-FR.md
          cp abe-v2.1/AllBossesEverywhere.cs artifact/BossesExtravaganza/Source.cs

      - name: Upload artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: BossesExtravaganza-1.0.0-SPT-4.0.13
          path: artifact/

      - name: Fail workflow when compilation failed
        if: steps.build.outcome != 'success'
        run: exit 1
